
<!DOCTYPE html>
<html>
<head>
  <title>My First Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      text-align: center;
      color: white;
    }

    h1 {
      margin-top: 100px;
      font-size: 3em;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background-color: white;
      color: #333;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #333;
      color: white;
    }
  </style>
</head>
<body>

  <h1>Welcome to My Website 🚀</h1>
  <button onclick="changeText()">Click Me</button>

  <script>
    function changeText() {
      document.querySelector("h1").innerText = "You clicked the button! 🎉";
    }
  </script>

</body>
</html>
